image:
  # Nexus path for this env's backend image. See charts/backend/values.yaml for the
  # port- vs path-based Nexus URL forms; the host must match the pull secret's
  # docker-server exactly.
  repository: <nexus-host>/<nexus-repo>/backend-api
  tag: "1.0.0"

env:
  LOG_LEVEL: DEBUG
  APP_ENV: dev

autoscaling:
  enabled: false

