name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      app-name:
        required: true
        type: string
      org:
        required: true
        type: string
      repo:
        required: true
        type: string
      cluster-server:
        required: true
        type: string
      backend-host:
        required: true
        type: string
      frontend-host:
        required: true
        type: string
      argo-namespace:
        required: false
        type: string
        default: openshift-gitops
      helm-version:
        required: false
        type: string
        default: "3.14.0"
      runner:
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      KUBECONFIG_B64:
        required: true

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: ${{ inputs.helm-version }}

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy AppSet
        run: |
          helm upgrade --install \
            "${{ inputs.app-name }}-appset" \
            ./deployments/appset \
            --namespace "${{ inputs.argo-namespace }}" \
            --create-namespace \
            --set-string appName="${{ inputs.app-name }}" \
            --set-string env="${{ inputs.env }}" \
            --set-string org="${{ inputs.org }}" \
            --set-string repo="${{ inputs.repo }}" \
            --set-string server="${{ inputs.cluster-server }}" \
            --set-string IngressBackendHost="${{ inputs.backend-host }}" \
            --set-string IngressFrontendHost="${{ inputs.frontend-host }}" \
            --wait --timeout 5m
