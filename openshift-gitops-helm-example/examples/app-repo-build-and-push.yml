# Reference workflow for application source repositories.
# Copy into your app repo's .github/workflows/ and adapt the placeholders.

name: Build, push, and trigger GitOps deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image-tag:
        description: Override image tag (default: short commit SHA)
        required: false
        type: string

env:
  REGISTRY: <your-registry>
  IMAGE_NAME: <your-namespace>/<your-service>

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image-tag }}"
          if [ -z "$TAG" ]; then
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ env.REGISTRY }}" \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  bump-gitops-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch bump-image-tag workflow in GitOps repo
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '<github-org>',
              repo: '<gitops-repo>',
              workflow_id: 'bump-image-tag.yml',
              ref: 'main',
              inputs: {
                tier: 'backend',
                service: 'api',
                env: 'dev',
                'image-tag': '${{ needs.build-and-push.outputs.image-tag }}'
              }
            });
