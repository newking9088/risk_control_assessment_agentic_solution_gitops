# Reference workflow for application source repositories.
# Copy into your app repo's .github/workflows/ and adapt the placeholders.

name: Build, push, and trigger GitOps deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image-tag:
        description: Override image tag (default: short commit SHA)
        required: false
        type: string

env:
  # Private Nexus registry host. Use the form your Nexus Docker repo is configured for:
  #   port-based:  nexus.host:8443        path-based:  nexus.host/repository/docker-hosted
  # This MUST match image.repository in the GitOps chart values and the pull secret's
  # docker-server, otherwise the cluster cannot pull what this job pushes.
  REGISTRY: <nexus-host>
  IMAGE_NAME: <nexus-repo>/<your-service>

jobs:
  build-and-push:
    # Build/push uses podman + buildah (the client standardises on podman, not docker).
    # podman/buildah are preinstalled on GitHub-hosted ubuntu-latest. Prefer a
    # SELF-HOSTED runner inside the Nexus network so it can reach the internal Nexus
    # host and trust its CA — see the "Nexus on OpenShift" notes in the GitOps repo
    # README for the CA-trust requirement that `podman login`/`podman push` depend on.
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image-tag }}"
          if [ -z "$TAG" ]; then
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to Nexus registry
        run: |
          # podman login (not docker login). Credentials come from repo secrets and
          # must be a Nexus account allowed to push to the target Docker repo.
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | podman login "${{ env.REGISTRY }}" \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          # A standard Dockerfile is fine — only the CLI changes (podman/buildah, no
          # docker CLI). `.` is the build context; -f names the Dockerfile explicitly.
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}"
          podman build -f Dockerfile -t "$IMAGE" .
          podman push "$IMAGE"

  bump-gitops-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch bump-image-tag workflow in GitOps repo
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '<github-org>',
              repo: '<gitops-repo>',
              workflow_id: 'bump-image-tag.yml',
              ref: 'main',
              inputs: {
                tier: 'backend',
                service: 'api',
                env: 'dev',
                'image-tag': '${{ needs.build-and-push.outputs.image-tag }}'
              }
            });
