{{- if and .Values.registryPullSecret.enabled .Values.secretStore }}
# Pull secret for the private Nexus registry, sourced through the External Secrets
# Operator (ESO). The `.dockerconfigjson` stored under <remotePrefix>DOCKER_CONFIG_JSON
# in the backing SecretStore must contain Nexus credentials whose registry host matches
# image.repository (the port- or path-based Nexus URL). ESO renders it into a native
# kubernetes.io/dockerconfigjson Secret in this namespace that the Deployment references
# via imagePullSecrets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.registryPullSecret.secretName }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.registryPullSecret.secretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: {{ .Values.secretStore.remotePrefix }}DOCKER_CONFIG_JSON
{{- end }}
