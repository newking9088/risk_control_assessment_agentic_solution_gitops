replicaCount: 1

image:
  repository: <your-registry>/<namespace>/frontend-ui
  pullPolicy: Always
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

route:
  enabled: true
  path: /
  domain: ""    # e.g. my-app-dev.apps.<cluster-domain>
  tls:
    termination: edge

oauth2Proxy:
  enabled: false
  port: 4180
  provider: oidc
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
  oidcIssuerUrl: ""
  extraArgs: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# secretStore:
#   name: aws-secrets-manager
#   remotePrefix: myapp/dev/

secrets: []
# - MY_SECRET_KEY

env: {}
# VITE_API_BASE_URL: https://my-app-dev.apps.<cluster-domain>

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

nameOverride: ""
fullnameOverride: ""

volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}
  - name: run
    emptyDir: {}
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /var/cache/nginx
  - name: run
    mountPath: /var/run

nodeSelector: {}
tolerations: []
affinity: {}
