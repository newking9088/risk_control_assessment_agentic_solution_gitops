replicaCount: 1

image:
  # Frontend image in the private Nexus container registry.
  # Nexus exposes Docker repositories in one of two URL forms — use whichever your
  # instance is configured for:
  #   port-based:  nexus.host:8443/<image>                      (one port per repo)
  #   path-based:  nexus.host/repository/docker-hosted/<image>  (one host, path per repo)
  # This repository host AND the pull secret's docker-server (see registryPullSecret)
  # must match EXACTLY, or image pulls fail with auth/not-found errors.
  repository: <nexus-host>/<nexus-repo>/frontend-ui
  pullPolicy: Always
  tag: "1.0.0"

# Pull secret for the private Nexus registry.
# Each service runs in its OWN namespace (the frontend lands in `ui`, the backend in
# `api`), so the frontend provisions its own pull Secret rather than sharing one. When
# `enabled` AND a `secretStore` is configured, templates/externalsecret-docker.yaml
# materialises a kubernetes.io/dockerconfigjson Secret (named `secretName`) in this
# namespace from Nexus credentials, and the Deployment mounts it via imagePullSecrets.
# Leave disabled for public/anonymous images.
registryPullSecret:
  enabled: false
  # Name of the rendered pull Secret in this (the frontend's) namespace.
  secretName: nexus-registry-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

route:
  enabled: true
  path: /
  domain: ""    # e.g. my-app-dev.apps.<cluster-domain>
  tls:
    termination: edge

oauth2Proxy:
  enabled: false
  port: 4180
  provider: oidc
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
  oidcIssuerUrl: ""
  extraArgs: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# secretStore:
#   name: aws-secrets-manager
#   remotePrefix: myapp/dev/

secrets: []
# - MY_SECRET_KEY

env: {}
# VITE_API_BASE_URL: https://my-app-dev.apps.<cluster-domain>

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

nameOverride: ""
fullnameOverride: ""

volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}
  - name: run
    emptyDir: {}
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /var/cache/nginx
  - name: run
    mountPath: /var/run

nodeSelector: {}
tolerations: []
affinity: {}
