replicaCount: 1

image:
  # Backend image in the private Nexus container registry.
  # Nexus exposes Docker repositories in one of two URL forms — use whichever your
  # instance is configured for:
  #   port-based:  nexus.host:8443/<image>                      (one port per repo)
  #   path-based:  nexus.host/repository/docker-hosted/<image>  (one host, path per repo)
  # This repository host AND the pull secret's docker-server (see registryPullSecret)
  # must match EXACTLY, or image pulls fail with auth/not-found errors.
  repository: <nexus-host>/<nexus-repo>/backend-api
  pullPolicy: Always
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

route:
  enabled: true
  path: /
  domain: ""    # e.g. my-app-dev.apps.<cluster-domain>
  tls:
    termination: edge

oauth2Proxy:
  enabled: false
  port: 4180
  provider: oidc
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
  oidcIssuerUrl: ""
  extraArgs: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Pull secret for the private Nexus registry.
# When `enabled` AND a `secretStore` is configured, templates/externalsecret-docker.yaml
# materialises a kubernetes.io/dockerconfigjson Secret (named `secretName`) from Nexus
# credentials held in the external secret store, and this Deployment mounts it via
# imagePullSecrets. Leave disabled for public/anonymous images.
registryPullSecret:
  enabled: false
  # Name of the rendered pull Secret in this (the backend's) namespace. The frontend
  # chart provisions its own pull Secret the same way in its own namespace.
  secretName: nexus-registry-secret

# secretStore:
#   name: aws-secrets-manager
#   remotePrefix: myapp/dev/

secrets: []
# - MY_SECRET_KEY

env: {}
# LOG_LEVEL: INFO

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 45
  periodSeconds: 30
  failureThreshold: 3
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 6
  timeoutSeconds: 3

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

nameOverride: ""
fullnameOverride: ""

volumes:
  - name: tmp
    emptyDir: {}
volumeMounts:
  - name: tmp
    mountPath: /tmp

nodeSelector: {}
tolerations: []
affinity: {}
