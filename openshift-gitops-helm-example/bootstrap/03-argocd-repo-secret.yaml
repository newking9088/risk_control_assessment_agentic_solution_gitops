# ── Step 3 (private repos only): register THIS GitOps repo with Argo CD ───────────
# Argo CD must be able to clone the repo it watches. Public repo → skip this file.
# Private repo → create this Secret in the Argo CD instance namespace (openshift-gitops);
# the `argocd.argoproj.io/secret-type: repository` label is what makes Argo CD treat it as
# a repository credential.
#
#   oc apply -f bootstrap/03-argocd-repo-secret.yaml
#
# SECURITY: do not commit a real token. Replace <GITOPS_REPO_TOKEN> at apply time, or
# source it from your secret manager (e.g. an ESO ExternalSecret that renders this Secret).
apiVersion: v1
kind: Secret
metadata:
  name: gitops-repo
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/<github-org>/<gitops-repo>.git
  username: git                  # any non-empty value when authenticating with a PAT
  password: <GITOPS_REPO_TOKEN>  # PAT with READ access to the repo
