# =============================================================================
# RCA Platform — GitOps Configuration
# =============================================================================
# Fill in all CHANGE_ME values before running scripts/apply-config.sh
# Values already populated are fixed for this project.
# Secrets remain in Azure Key Vault; nothing is read from .env
# =============================================================================

# --- App identity (fixed) ---
APP_NAME: "risk-control-assessment-agentic-solution"
GITHUB_ORG: "newking9088"
GITHUB_REPO: "risk_control_assessment_agentic_solution_gitops"

# --- Container registry ---
# e.g. ghcr.io/newking9088  OR  myacr.azurecr.io/myteam
REGISTRY_URL: "CHANGE_ME_REGISTRY_URL"
API_IMAGE_PATH: "api"
AUTH_IMAGE_PATH: "auth"
UI_IMAGE_PATH: "ui"
PULL_SECRET_NAME: "CHANGE_ME_PULL_SECRET_NAME"

# --- Domain ---
# Resulting domains:
#   dev:   risk-control-assessment-agentic-solution-dev.DOMAIN_SUFFIX
#   qa:    risk-control-assessment-agentic-solution-qa.DOMAIN_SUFFIX
#   stage: risk-control-assessment-agentic-solution-stage.DOMAIN_SUFFIX
#   prod:  risk-control-assessment-agentic-solution.DOMAIN_SUFFIX
DOMAIN_SUFFIX: "CHANGE_ME_DOMAIN_SUFFIX"

# --- Azure Key Vault names ---
KEYVAULT_NAME_DEV: "CHANGE_ME_KEYVAULT_DEV"     # used for dev + qa
KEYVAULT_NAME_PROD: "CHANGE_ME_KEYVAULT_PROD"   # used for stage + prod
DOCKER_KEYVAULT_NAME: "CHANGE_ME_DOCKER_KV"     # holds the registry pull secret

# --- Service ports (fixed by architecture) ---
API_PORT: "8000"
AUTH_PORT: "8001"
UI_PORT: "8080"

# --- LLM & auth config (fixed) ---
LLM_API_URL: "https://api.openai.com"
ADMIN_EMAIL: "newking9088@gmail.com"

# --- Kubernetes / ArgoCD ---
# For AKS: https://<aks-api-server-fqdn>
# For in-cluster: https://kubernetes.default.svc
CLUSTER_SERVER: "CHANGE_ME_CLUSTER_SERVER"

# --- CI/CD ---
CI_RUNNER: "ubuntu-latest"
# Leave empty for standalone workflows; set to "org/repo/.github/workflows/deploy.yml@main" for reusable
CI_REUSABLE_WORKFLOW_REF: ""
