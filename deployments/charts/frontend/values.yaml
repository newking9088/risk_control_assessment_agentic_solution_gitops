# Default values — overridden by deployments/values/frontend/<env>/ui/values.yaml
replicaCount: 1
enabled: false

image:
  repository: "CHANGE_ME_REGISTRY_URL/ui"
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: "CHANGE_ME_PULL_SECRET_NAME"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

automountServiceAccountToken: false

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  domain: "localhost"
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-credentials: 'true'
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Length,Content-Range"
    nginx.ingress.kubernetes.io/enable-cors: 'true'
  paths:
    - path: /
      pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

networkPolicy:
  enabled: false  # opt-in — set ingressNamespaceSelector or ingressPodSelector before enabling
  ingressNamespaceSelector: {}
  # matchLabels:
  #   app.kubernetes.io/name: ingress-nginx
  ingressPodSelector: {}
  # matchLabels:
  #   app.kubernetes.io/name: ingress-nginx

keyvault:
  name: ""
secrets: []
env: {}

volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}
  - name: run
    emptyDir: {}
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /var/cache/nginx
  - name: run
    mountPath: /var/run
nodeSelector: {}
tolerations: []
affinity: {}
