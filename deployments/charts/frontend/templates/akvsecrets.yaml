{{- if and .Values.keyvault .Values.keyvault.name }}
{{- if .Values.secrets }}
{{- range .Values.secrets }}
apiVersion: spv.no/v2beta1
kind: AzureKeyVaultSecret
metadata:
  name: {{ include "frontend.fullname" $ }}-{{ . | replace "_" "-" | lower }}
  labels:
    {{- include "frontend.labels" $ | nindent 4 }}
spec:
  vault:
    name: {{ $.Values.keyvault.name }}
  object:
    name: {{ . | replace "_" "-" }}
    type: secret
  output:
    secret:
      name: {{ include "frontend.fullname" $ }}-{{ . | replace "_" "-" | lower }}
      dataKey: {{ . }}
---
{{- end }}
{{- end }}
{{- end }}
