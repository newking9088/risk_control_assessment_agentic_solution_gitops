{{- if .Values.networkPolicy.enabled }}
{{- if and (not .Values.networkPolicy.ingressNamespaceSelector) (not .Values.networkPolicy.ingressPodSelector) }}
{{ fail "networkPolicy.enabled requires ingressNamespaceSelector or ingressPodSelector" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
        {{- end }}
        {{- if .Values.networkPolicy.ingressPodSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 12 }}
        {{- end }}
{{- end }}
