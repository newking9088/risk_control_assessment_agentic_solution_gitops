name: CI Tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # to refresh SHA: gh api repos/actions/checkout/git/refs/tags/v4.2.2

      - name: Install gettext (envsubst)
        run: sudo apt-get update && sudo apt-get install -y gettext shellcheck python3-yaml

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        # to refresh SHA: gh api repos/azure/setup-helm/git/refs/tags/v4.3.0

      - name: Run test suite
        run: bash tests/run_all.sh
