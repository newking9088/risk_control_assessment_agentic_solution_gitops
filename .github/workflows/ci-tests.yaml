name: CI Tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        # to refresh SHA: gh api repos/actions/checkout/git/refs/tags/v4.2.2

      - name: Install gettext (envsubst)
        run: sudo apt-get update && sudo apt-get install -y gettext shellcheck python3-yaml

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        # to refresh SHA: gh api repos/azure/setup-helm/git/refs/tags/v4.3.0

      - name: Run test suite
        run: bash tests/run_all.sh
